  <p>接続詞・受動態・時制・仮定法・関係詞など発展的な構文35個。S/V/O/Cカラーコーディング付き。</p>

<script>
const PCATS={"modal":"助動詞","inf":"不定詞/動名詞","cmp":"比較","cond":"条件/仮定","conn":"接続/理由","pass":"受動態","tense":"時制","rel":"関係詞/その他"};
const CATCLS={"modal":"cat-modal","inf":"cat-inf","cmp":"cat-cmp","cond":"cat-cond","conn":"cat-conn","pass":"cat-pass","tense":"cat-tense","rel":"cat-rel"};
const D=[{n:36,f:`not only A but also B`,m:`AだけでなくBも`,th:`ไม่เพียงแต่ A แต่ยัง B`,thk:`マイ ピアン デー A デー ヤン B`,cat:`conn`,tip:`相関接続詞。動詞の一致はBに合わせる。文頭に\"Not only\"を置くと倒置が起きる。`,warn:null,exs:[{e:`Not only <span class="tok tok-s">you</span> but also <span class="tok tok-s">I</span> <span class="tok tok-v">am</span> <span class="tok tok-c">tired</span>.`,j:`あなただけでなく私も疲れている。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-v">is</span> not only <span class="tok tok-c">smart</span> but also <span class="tok tok-c">kind</span>.`,j:`賢いだけでなく親切でもある。`}, {e:`<span class="tok tok-s">They</span> <span class="tok tok-v">sell</span> not only <span class="tok tok-o">coffee</span> but also <span class="tok tok-o">tea</span>.`,j:`コーヒーだけでなくお茶も売っている。`}]},{n:37,f:`either A or B`,m:`AかBのどちらか`,th:`หรือ A หรือ B`,thk:`ルー A ルー B`,cat:`conn`,tip:`相関接続詞。動詞の一致はBに合わせる。`,warn:null,exs:[{e:`<span class="tok tok-s">You</span> <span class="tok tok-m">can<sup>M</sup></span> either <span class="tok tok-v">stay</span> or <span class="tok tok-v">leave</span>.`,j:`留まるか去るかどちらかだ。`}, {e:`Either <span class="tok tok-s">he</span> or <span class="tok tok-s">I</span> <span class="tok tok-m">will<sup>M</sup></span> <span class="tok tok-v">go</span>.`,j:`彼か私のどちらかが行く。`}, {e:`<span class="tok tok-v">Choose</span> either <span class="tok tok-o">red</span> or <span class="tok tok-o">blue</span>.`,j:`赤か青を選んで。`}]},{n:38,f:`neither A nor B`,m:`AでもBでもない`,th:`ไม่ A และไม่ B`,thk:`マイ A レ マイ B`,cat:`conn`,tip:`相関接続詞の否定形。動詞はBに合わせる。neither単独でも「どちらも〜ない」の意味。`,warn:null,exs:[{e:`Neither <span class="tok tok-s">you</span> nor <span class="tok tok-s">he</span> <span class="tok tok-v">was</span> <span class="tok tok-c">right</span>.`,j:`あなたも彼も正しくなかった。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-v">likes</span> neither <span class="tok tok-o">cats</span> nor <span class="tok tok-o">dogs</span>.`,j:`猫も犬も好きではない。`}, {e:`Neither <span class="tok tok-s">rain</span> nor <span class="tok tok-s">snow</span> <span class="tok tok-v">stopped</span> <span class="tok tok-o">us</span>.`,j:`雨も雪も私たちを止められなかった。`}]},{n:39,f:`both A and B`,m:`AもBも両方`,th:`ทั้ง A และ B`,thk:`タン A レ B`,cat:`conn`,tip:`相関接続詞。動詞は必ず複数形。`,warn:null,exs:[{e:`Both <span class="tok tok-s">Tom</span> and <span class="tok tok-s">Ann</span> <span class="tok tok-v">came</span>.`,j:`トムとアンの両方が来た。`}, {e:`<span class="tok tok-s">He</span> <span class="tok tok-v">speaks</span> both <span class="tok tok-o">Thai</span> and <span class="tok tok-o">English</span>.`,j:`タイ語と英語の両方を話す。`}, {e:`<span class="tok tok-s">We</span> <span class="tok tok-v">need</span> both <span class="tok tok-o">time</span> and <span class="tok tok-o">money</span>.`,j:`時間とお金の両方が必要だ。`}]},{n:40,f:`as soon as S + V`,m:`〜するとすぐに`,th:`ทันทีที่…`,thk:`タンティー ティー…`,cat:`conn`,tip:`節内は未来でも現在時制。「the moment S V」「the instant S V」でも同じ意味を表せる。`,warn:null,exs:[{e:`<span class="tok tok-v">Call</span> me as soon as <span class="tok tok-s">you</span> <span class="tok tok-v">arrive</span>.`,j:`着いたらすぐに電話して。`}, {e:`As soon as it <span class="tok tok-v">stops</span>, <span class="tok tok-s">we</span> <span class="tok tok-m">'ll<sup>M</sup></span> <span class="tok tok-v">go</span>.`,j:`止んだらすぐ行く。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-v">left</span> as soon as <span class="tok tok-s">she</span> <span class="tok tok-v">finished</span>.`,j:`終わったらすぐに去った。`}]},{n:41,f:`while + S + V`,m:`〜している間に`,th:`ในขณะที่…`,thk:`ナイ カナティー…`,cat:`conn`,tip:`同時進行を表す。while節は通常進行形または状態動詞を使う。`,warn:null,exs:[{e:`<span class="tok tok-s">I</span> <span class="tok tok-v">read</span> while <span class="tok tok-v">waiting</span>.`,j:`待っている間、本を読んだ。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-v">sang</span> while <span class="tok tok-v">cooking</span>.`,j:`料理しながら歌った。`}, {e:`While <span class="tok tok-s">I</span> <span class="tok tok-v">was walking</span>, it <span class="tok tok-v">rained</span>.`,j:`歩いている間に雨が降った。`}]},{n:42,f:`before / after + V-ing`,m:`〜する前に／後で`,t `,j:`彼らはとても仲の良い友達だ。`}]},{n:62,f:`be known to / for / as`,m:`〜として知られている`,th:`เป็นที่รู้จักใน/ว่า`,thk:`ペン ティー ルー ジャック ナイ/ワー`,cat:`pass`,tip:`be known to（〜に知られている）/ be known for（〜で有名）/ be known as（〜として知られている）の3つを区別。`,warn:null,exs:[{e:`<span class="tok tok-s">He</span> <span class="tok tok-v">is known</span> to <span class="tok tok-o">everyone</span>.`,j:`彼はみんなに知られている。`}, {e:`The <span class="tok tok-s">city</span> <span class="tok tok-v">is known</span> for <span class="tok tok-o">its food</span>.`,j:`その街は食べ物で有名だ。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-v">is known</span> as <span class="tok tok-c">a singer</span>.`,j:`彼女は歌手として知られている。`}]},{n:63,f:`keep (on) + V-ing`,m:`〜し続ける`,th:`（ยัง） ทำ + V ต่อไป`,thk:`（ヤン）タム + V トー パイ`,cat:`inf`,tip:`continue + V-ing / to Vも同義。「keep on」は「keep」よりやや強調（努力して続ける）。`,warn:null,exs:[{e:`<span class="tok tok-v">Keep</span> <span class="tok tok-o">studying</span>.`,j:`勉強し続けて。`}, {e:`<span class="tok tok-s">He</span> <span class="tok tok-v">kept</span> <span class="tok tok-o">talking</span> all night.`,j:`彼は一晩中話し続けた。`}, {e:`<span class="tok tok-s">They</span> <span class="tok tok-v">keep on</span> <span class="tok tok-o">trying</span>.`,j:`彼らはずっと挑戦し続けている。`}]},{n:64,f:`stop + V-ing / to V`,m:`〜をやめる / 〜するために立ち止まる`,th:`หยุด + V`,thk:`ユット + V`,cat:`inf`,tip:`stop V-ing（〜するのをやめる）vs stop to V（〜するために立ち止まる）。意味が全く違う！`,warn:`⚠️「I stopped smoking.」（禁煙した）≠「I stopped to smoke.」（吸うために立ち止まった）。超重要な使い分け！`,exs:[{e:`<span class="tok tok-s">I</span> <span class="tok tok-v">stopped</span> <span class="tok tok-o">smoking</span>.`,j:`私は禁煙した（喫煙をやめた）。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-v">stopped</span> to <span class="tok tok-v">rest</span>.`,j:`彼女は休むために立ち止まった。`}, {e:`<span class="tok tok-s">They</span> <span class="tok tok-v">stopped</span> <span class="tok tok-o">laughing</span>.`,j:`彼らは笑うのをやめた。`}]},{n:65,f:`feel like + V-ing`,m:`〜したい気分だ`,th:`รู้สึกอยาก + V`,thk:`ルースック ヤーク + V`,cat:`inf`,tip:`likeは前置詞なので後はV-ing（動 詞なので後はV-ing（動名詞）。`,warn:`「worth to read」は誤り！正しくは「worth <u>reading</u>」（V-ing）。`,exs:[{e:`This <span class="tok tok-s">book</span> <span class="tok tok-v">is worth</span> <span class="tok tok-o">reading</span>.`,j:`この本は読む価値がある。`}, {e:`The <span class="tok tok-s">movie</span> <span class="tok tok-v">is worth</span> <span class="tok tok-o">seeing</span>.`,j:`この映画は観る価値がある。`}, {e:`The <span class="tok tok-s">idea</span> <span class="tok tok-v">is worth</span> <span class="tok tok-o">considering</span>.`,j:`そのアイデアは検討する価値がある。`}]},{n:69,f:`by the time S + V, …`,m:`〜する頃には（時間の基準点）`,th:`ภายในตอนที่…`,thk:`パイ ナイ トーン ティー…`,cat:`tense`,tip:`「by the time + 現在形」→主節は現在完了or単純未来。「by the time + 過去形」→主節は過去完了が自然（大過去）。`,warn:null,exs:[{e:`By the time <span class="tok tok-s">I</span> <span class="tok tok-v">arrived</span>, <span class="tok tok-s">he</span> <span class="tok tok-v">had left</span>.`,j:`私が着いた頃には彼はすでに去っていた。`}, {e:`By the time <span class="tok tok-s">we</span> <span class="tok tok-v">finish</span>, it <span class="tok tok-m">'ll<sup>M</sup></span> <span class="tok tok-v">be</span> <span class="tok tok-c">dark</span>.`,j:`終わる頃には暗くなるだろう。`}, {e:`<span class="tok tok-v">Call</span> me by the time <span class="tok tok-s">you</span> <span class="tok tok-v">get</span> home.`,j:`家に着いたら電話して。`}]},{n:70,f:`be likely to V`,m:`〜しそうだ／〜する可能性が高い`,th:`มีแนวโน้มที่จะ + V`,thk:`ミー ネーウ ノーム ティー ジャ + V`,cat:`modal`,tip:`「It is likely that S + V」との書き換え可能。反意語はbe unlikely to V。`,warn:null,exs:[{e:`It <span class="tok tok-v">is</span> <span class="tok tok-c">likely</span> to <span class="tok tok-v">rain</span>.`,j:`雨が降りそうだ。`}, {e:`<span class="tok tok-s">He</span> <span class="tok tok-v">is</span> <span class="tok tok-c">likely</span> to <span class="tok tok-v">win</span>.`,j:`彼は勝ちそうだ。`}, {e:`<span class="tok tok-s">They</span> <span class="tok tok-v">are</span> <span class="tok tok-c">likely</span> to <span class="tok tok-v">be</span> late.`,j:`彼らは遅れそうだ。`}]}];
function speak(t){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.9;speechSynthesis.speak(u);}
function plainText(h){return h.replace(/<[^>]+>/g,'');}
function render(list){
  document.getElementById('pg').innerHTML=list.map(p=>{
    const cc=CATCLS[p.cat]||'cat-rel';
    const thR=p.th?`<div class="pat-th-row"><div class="pat-th">${p.th}</div><div class="pat-thk">${p.thk}</div></div>`:'';
    const tipR=p.tip?`<div class="tip-box">💡 ${p.tip}</div>`:'';
    const warnR=p.warn?`<div class="warn-box">⚠️ ${p.warn}</div>`:'';
    const exR=p.exs.map(e=>`<div class="ex-block">
      <button class="spk" onclick="speak(\`${plainText(e.e).replace(/\`/g,"'")}\`)">🔊</button>
      <div class="ex-en">${e.e}</div>
      <div class="ex-jp">${e.j}</div>
    </div>`).join('');
    return `<div class="pat-card" data-cat="${p.cat}" data-text="${plainText(p.f+p.m+(p.tip||'')+(p.warn||'')+p.exs.map(e=>e.j).join(''))}">
      <div class="pat-top"><div class="pat-num">#${String(p.n).padStart(2,'0')}</div><span class="pat-tag ${cc}">${PCATS[p.cat]||p.cat}</span></div>
      <div class="pat-formula-box">${p.f}</div>
      <div class="pat-m">${p.m}</div>
      ${thR}${tipR}${warnR}
      <div class="pat-exs">${exR}</div>
    </div>`;
  }).join('');
  document.getElementById('rct').textContent=list.length+'件表示中';
}
let CURCAT='all';
function filterByCat(cat,btn){CURCAT=cat;document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filterPat();}
function filterPat(){
  const q=document.getElementById('psrch').value.toLowerCase();
  const vis=D.filter(p=>{
    const mc=CURCAT==='all'||p.cat===CURCAT;
    const mq=!q||p['data-text']?.includes(q)||(p.f+p.m+(p.tip||'')+(p.warn||'')+p.exs.map(e=>e.j+plainText(e.e)).join('')).toLowerCase().includes(q);
    return mc&&mq;
  });
  render(vis);
}
render(D);
</script>
