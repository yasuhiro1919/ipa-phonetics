  <h1>重要構文 #1〜35（前半）</h1>
  <p>助動詞系・不定詞/動名詞・比較・条件/仮定・接続/理由の構文35個。S/V/O/Cカラーコーディング付き。</p>

<script>
const PCATS={"modal":"助動詞","inf":"不定詞/動名詞","cmp":"比較","cond":"条件/仮定","conn":"接続/理由","pass":"受動態","tense":"時制","rel":"関係詞/その他"};
const CATCLS={"modal":"cat-modal","inf":"cat-inf","cmp":"cat-cmp","cond":"cat-cond","conn":"cat-conn","pass":"cat-pass","tense":"cat-tense","rel":"cat-rel"};
const D=[{n:1,f:`It is + 形容詞 + to V`,m:`〜するのは…だ`,th:`การ + V + เป็น + 形容詞`,thk:`カーン + V + ペン + 形容詞`,cat:`inf`,tip:`「It」は形式主語。本当の主語は「to V」の部分。「It is 形容詞 for 人 to V」（人が〜するのは…）の形も重要。`,warn:`「It is kind <u>of</u> you」（=人の性質）と「It is important <u>for</u> you」（=人の立場）を区別。`,exs:[{e:`It <span class="tok tok-v">is</span> <span class="tok tok-c">easy</span> to <span class="tok tok-v">learn<sup>V</sup></span> English.`,j:`英語を学ぶのは簡単だ。`}, {e:`It <span class="tok tok-v">is</span> <span class="tok tok-c">dangerous</span> to <span class="tok tok-v">drive<sup>V</sup></span> too fast.`,j:`スピードを出しすぎるのは危険だ。`}, {e:`It <span class="tok tok-v">is</span> <span class="tok tok-c">important</span> to <span class="tok tok-v">eat<sup>V</sup></span> breakfast.`,j:`朝食を食べることは大切だ。`}]},{n:2,f:`can / could / may / might + V`,m:`〜できる／〜かもしれない`,th:`สามารถ / อาจจะ + V`,thk:`サーマート / アート ジャ + V`,cat:`modal`,tip:`can（能力/現在）/ could（過去の能力・丁寧）/ may（許可・推量）/ might（可能性低い推量）。couldはcanより丁寧。`,warn:`「cannot」と書くのが標準。「can not」と分けると「できないこともある」のニュアンスになる場合がある。`,exs:[{e:`<span class="tok tok-s">I</span> <span class="tok tok-m">can<sup>M</sup></span> <span class="tok tok-v">swim</span> well.`,j:`私は上手に泳げる。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-m">could<sup>M</sup></span> <span class="tok tok-v">play</span> the <span class="tok tok-o">piano</span> at five.`,j:`彼女は5歳でピアノが弾けた。`}, {e:`<span class="tok tok-m">May</span> <span class="tok tok-s">I</span> <span class="tok tok-v">use</span> your phone?`,j:`電話を使ってもいいですか？`}]},{n:3,f:`should / must / have to + V`,m:`〜すべき／しなければならない`,th:`ควร / ต้อง + V`,thk:`クワーン / トン + V`,cat:`modal`,tip:`should（義務・アドバイス）/ must（強い義務・推量）/ have to（外的義務）。`,warn:`⚠️ must not（〜してはならない）≠ don't have to（〜しなくていい）。超頻出の混同ポイント！`,exs:[{e:`<span class="tok tok-s">You</span> <span class="tok tok-m">should<sup>M</sup></span> <span class="tok tok-v">see</span> a doctor.`,j:`医者に診てもらった方がいい。`}, {e:`<span class="tok tok-s">I</span> <span class="tok tok-m">must<sup>M</sup></span> <span class="tok tok-v">go</span> now.`,j:`今すぐ行かなければならない。`}, {e:`<span class="tok tok-s">Students</span> <span class="tok tok-m">have to<sup>M</sup></span> <span class="tok tok-v">wear</span> uniforms.`,j:`生徒は制服を着なければならない。`}]},{n:4,f:`be able to + V`,m:`〜できる`,th:`สามารถที่จะ + V`,thk:`サーマート ティー ジャ + V`,cat:`modal`,tip:`canと同義だが時制の変化が自由。will be able to（未来）/ was able to（過去）のように使える。`,warn:null,exs:[{e:`<span class="tok tok-s">I'm</span> <span class="tok tok-m">able to<sup>M</sup></span> <span class="tok tok-v">help</span>.`,j:`私は助けることができる。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-m">will be able to<sup>M</sup></span> <span class="tok tok-v">drive</span> soon.`,j:`彼女はすぐ運転できるようになる。`}, {e:`<span class="tok tok-m">Were</span> <span class="tok tok-s">you</span> <span class="tok tok-m">able to<sup>M</sup></span> <span class="tok tok-v">find</span> it?`,j:`それを見つけられましたか？`}]},{n:5,f:`be going to + V`,m:`〜するつもりだ／〜しそうだ`,th:`กำลังจะ + V`,thk:`ガムラン ジャ + V`,cat:`modal`,tip:`①計画・意図（I'm going to study）②根拠のある予測（Look at the clouds—it's going to rain）。`,warn:`willは「その場で決めた」予定。be going toは「すでに決まっていた」計画・確実な予測。`,exs:[{e:`<span class="tok tok-s">I'm</span> <span class="tok tok-m">going to<sup>M</sup></span> <span class="tok tok-v">visit</span> <span class="tok tok-o">Bangkok</span>.`,j:`バンコクを訪れるつもりだ。`}, {e:`It's <span class="tok tok-m">going to<sup>M</sup></span> <span class="tok tok-v">rain</span>.`,j:`雨が降りそうだ。`}, {e:`<span class="tok tok-s">They're</span> <span class="tok tok-m">going to<sup>M</sup></span> <span class="tok tok-v">start</span> a <span class="tok tok-o">company</span>.`,j:`彼らは会社を設立するつもりだ。`}]},{n:6,f:`will + V`,m:`〜するだろう（未来）`,th:`จะ + V`,thk:`ジャ + V`,cat:`modal`,tip:`①その場での決定（I'll help you!）②予測（It will be sunny）③意志・約束（I will never give up）。`,warn:null,exs:[{e:`<span class="tok tok-s">I</span> <span class="tok tok-m">will<sup>M</sup></span> <span class="tok tok-v">call</span> <span class="tok tok-o">you</span> tonight.`,j:`今夜電話します。`}, {e:`<span class="tok tok-s">Prices</span> < pan class="tok tok-v">decided</span> to <span class="tok tok-v">study abroad</span>.`,j:`留学することを決めた。`}, {e:`<span class="tok tok-s">They</span> <span class="tok tok-v">decided</span> to <span class="tok tok-v">move</span>.`,j:`引っ越すことを決めた。`}]},{n:30,f:`plan to V`,m:`〜する予定だ`,th:`วางแผน ที่จะ + V`,thk:`ワーン ペーン ティー ジャ + V`,cat:`inf`,tip:`be planning to Vでも可。「plan on + V-ing」という形も使われる（より口語的）。`,warn:null,exs:[{e:`<span class="tok tok-s">We</span> <span class="tok tok-v">plan</span> to <span class="tok tok-v">marry</span> in June.`,j:`私たちは6月に結婚する予定だ。`}, {e:`<span class="tok tok-s">He</span> <span class="tok tok-v">plans</span> to <span class="tok tok-v">open</span> a shop.`,j:`彼は店を開く計画だ。`}, {e:`<span class="tok tok-s">I</span> <span class="tok tok-v">plan</span> to <span class="tok tok-v">sleep</span> early.`,j:`早く寝るつもりだ。`}]},{n:31,f:`seem to V`,m:`〜のようだ`,th:`ดูเหมือนว่า จะ + V`,thk:`ドゥー ムアン ワー ジャ + V`,cat:`inf`,tip:`「It seems that + S + V」の書き換えもできる（He seems to know. = It seems that he knows.）。`,warn:null,exs:[{e:`<span class="tok tok-s">He</span> <span class="tok tok-v">seems</span> to <span class="tok tok-v">know</span>.`,j:`彼は知っているようだ。`}, {e:`It <span class="tok tok-v">seems</span> to <span class="tok tok-v">work</span>.`,j:`うまく機能しているようだ。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-v">seemed</span> to <span class="tok tok-v">understand</span>.`,j:`彼女は理解しているようだった。`}]},{n:32,f:`tend to V`,m:`〜する傾向がある`,th:`มักจะ + V`,thk:`マック ジャ + V`,cat:`inf`,tip:`習慣・傾向・一般的な事実を表す。have a tendency to Vとほぼ同義。`,warn:null,exs:[{e:`<span class="tok tok-s">Cats</span> <span class="tok tok-v">tend</span> to <span class="tok tok-v">sleep</span> a lot.`,j:`猫はよく眠る傾向がある。`}, {e:`<span class="tok tok-s">Prices</span> <span class="tok tok-v">tend</span> to <span class="tok tok-v">rise</span> in summer.`,j:`夏は物価が上がる傾向がある。`}, {e:`<span class="tok tok-s">He</span> <span class="tok tok-v">tends</span> to <span class="tok tok-v">forget</span> names.`,j:`彼は名前を忘れる傾向がある。`}]},{n:33,f:`no matter how/what/where…`,m:`たとえ〜でも`,th:`ไม่ว่า อย่างไร/อะไร/ที่ไหน`,thk:`マイ ワー ヤーン ライ/アライ/ティー ナイ`,cat:`cond`,tip:`譲歩（逆接）の構文。however/whatever/wherever などの複合関係詞でも同じ意味を表せる。`,warn:null,exs:[{e:`No matter what <span class="tok tok-s">you</span> <span class="tok tok-v">say</span>, <span class="tok tok-s">I</span> <span class="tok tok-m">'ll<sup>M</sup></span> <span class="tok tok-v">go</span>.`,j:`何を言っても私は行く。`}, {e:`No matter how hard it <span class="tok tok-v">is</span>, <span class="tok tok-v">try</span>.`,j:`どんなに難しくても挑戦しろ。`}, {e:`No matter where <span class="tok tok-s">you</span> <span class="tok tok-v">are</span>, <span class="tok tok-v">call</span> me.`,j:`どこにいても電話して。`}]},{n:34,f:`so that S can/will + V`,m:`〜できるように（目的）`,th:`เพื่อที่ จะ + V`,thk:`プア ティー ジャ + V`,cat:`conn`,tip:`目的を表す副詞節。in order thatも同義（よりフォーマル）。in order to Vとの違い：so thatは節（S+V）。`,warn:null,exs:[{e:`<span class="tok tok-s">I</span> <span class="tok tok-v">study</span> hard so that <span class="tok tok-s">I</span> <span class="tok tok-m">can<sup>M</sup></span> <span class="tok tok-v">pass</span>.`,j:`合格できるように一生懸命勉強する。`}, {e:`<span class="tok tok-s">She</span> <span class="tok tok-v">spoke</span> loudly so that all <span class="tok tok-m">could<sup>M</sup></span> <span class="tok tok-v">hear</span>.`,j:`全員に聞こえるよう大声で話した。`}, {e:`<span class="tok tok-v">Leave</span> early so that <span class="tok tok-s">we</span> <span class="tok tok-m">'ll<sup>M</sup></span> <span class="tok tok-v">arrive</span> on time.`,j:`時間通りに着くよう早く出発して。`}]},{n:35,f:`in order to V`,m:`〜するために（目的）`,th:`เพื่อ ที่จะ + V`,thk:`プア ティー ジャ + V`,cat:`inf`,tip:`to Vだけでも目的を表せるがin order toはより明確・フォーマル。否定は「in order not to V」。`,warn:null,exs:[{e:`<span class="tok tok-s">I</span> <span class="tok tok-v">ran</span> in order to <span class="tok tok-v">catch</span> the bus.`,j:`バスに乗るために走った。`}, {e:`<span class="tok tok-s">He</span> <span class="tok tok-v">saved</span> money in order to <span class="tok tok-v">travel</span>.`,j:`旅行するためにお金を貯めた。`}, {e:`<span class="tok tok-s">We</span> <span class="tok tok-v">practice</span> in order to <span class="tok tok-v">improve</span>.`,j:`上達するために練習する。`}]}];
function speak(t){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.9;speechSynthesis.speak(u);}
function plainText(h){return h.replace(/<[^>]+>/g,'');}
function render(list){
  document.getElementById('pg').innerHTML=list.map(p=>{
    const cc=CATCLS[p.cat]||'cat-rel';
    const thR=p.th?`<div class="pat-th-row"><div class="pat-th">${p.th}</div><div class="pat-thk">${p.thk}</div></div>`:'';
    const tipR=p.tip?`<div class="tip-box">💡 ${p.tip}</div>`:'';
    const warnR=p.warn?`<div class="warn-box">⚠️ ${p.warn}</div>`:'';
    const exR=p.exs.map(e=>`<div class="ex-block">
      <button class="spk" onclick="speak(\`${plainText(e.e).replace(/\`/g,"'")}\`)">🔊</button>
      <div class="ex-en">${e.e}</div>
      <div class="ex-jp">${e.j}</div>
    </div>`).join('');
    return `<div class="pat-card" data-cat="${p.cat}" data-text="${plainText(p.f+p.m+(p.tip||'')+(p.warn||'')+p.exs.map(e=>e.j).join(''))}">
      <div class="pat-top"><div class="pat-num">#${String(p.n).padStart(2,'0')}</div><span class="pat-tag ${cc}">${PCATS[p.cat]||p.cat}</span></div>
      <div class="pat-formula-box">${p.f}</div>
      <div class="pat-m">${p.m}</div>
      ${thR}${tipR}${warnR}
      <div class="pat-exs">${exR}</div>
    </div>`;
  }).join('');
  document.getElementById('rct').textContent=list.length+'件表示中';
}
let CURCAT='all';
function filterByCat(cat,btn){CURCAT=cat;document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filterPat();}
function filterPat(){
  const q=document.getElementById('psrch').value.toLowerCase();
  const vis=D.filter(p=>{
    const mc=CURCAT==='all'||p.cat===CURCAT;
    const mq=!q||p['data-text']?.includes(q)||(p.f+p.m+(p.tip||'')+(p.warn||'')+p.exs.map(e=>e.j+plainText(e.e)).join('')).toLowerCase().includes(q);
    return mc&&mq;
  });
  render(vis);
}
render(D);
</script>
